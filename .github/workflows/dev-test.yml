name: "run tests"

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ develop ]

concurrency:
  group: ci-dev-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 21.4.0

      - name: Install backend dependencies & Run tests
        run: |
          cd backend
          npm install
          npm run test
        
      - name: Install frontend dependencies & Run tests
        run: |
          cd frontend
          npm install
          npm run test