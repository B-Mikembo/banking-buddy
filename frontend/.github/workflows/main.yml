name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21.4

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build Project
        run: npm run build

      - name: Run unit tests
        run: npm test
